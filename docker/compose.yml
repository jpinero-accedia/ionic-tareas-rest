services:
  tareasrest-app:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    container_name: tareasrest-app-dev
    env_file:
      - ./.env
    volumes:
      - ./app/src:/app/src
      - node-modules:/app/node_modules
      - yarn-cache:/app/.yarn
    ports:
      - "${PORT}:3000"
    develop:
      watch:
        - action: sync
          path: ./app/src
          target: ./src
          initial_sync: true
        - action: sync
          path: ./app/package.json
          target: ./package.json
          initial_sync: true

volumes:
  node-modules:
    name: tareasrest-app-dev-node-modules
  yarn-cache:
    name: tareasrest-app-dev-yarn-cache
